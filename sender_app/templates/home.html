<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Mail Demo</title>
</head>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background-image:url("https://images.pexels.com/photos/2847648/pexels-photo-2847648.jpeg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    font-family:Arial, sans-serif;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}


h1{
    color:balck;
    font-size:40px;
    margin-bottom:30px;
}


form{
    width:420px;

    padding:35px;

    background:rgb(255, 255, 255);

    backdrop-filter:blur(10px);

    border-radius:15px;

    box-shadow:0 0 25px black;
}


form div{
    margin-bottom:20px;
}


label{
    display:block;

    color:black;

    font-size:18px;

    margin-bottom:8px;
}


input,
textarea{

    width:100%;

    padding:13px;

    border:none;

    outline:none;

    border-radius:8px;

    background:#d3d3d3;

    color:black;

    font-size:16px;
}
input:hover,
textarea:hover{
    background:rgb(39, 22, 22);
    color:white;
    border-color:#007bff;}


input[type="submit"]{

    width:100%;

    padding:14px;

    background:#0175f0;

    color:white;

    border:none;

    border-radius:8px;

    font-size:18px;

    cursor:pointer;

    transition:0.3s;
}


input[type="submit"]:hover{

    background:#f079c2;

    transform:scale(1.05);
}
</style>

<body>
    <h1>EMAIL SENDER</h1>

     <form action="{% url 'send_mail' %}" method="POST">
        {% csrf_token %}
        <div>
            <label for="name">Name:</label>
            <input id="name" name="name" type="text" placeholder="Put Your name">
        </div>
        <div>
            <label for="sbj">Subject:</label>
            <input id="sbj" name="subject" type="text" placeholder="Put Your subject">
        </div>
        <div>
            <label for="msg">Message:</label>
            <input id="msg" name="message" type="text" placeholder="Put Your message">
        </div>
        <input type="submit" , value="Send Mail">

    </form>

</body>

</html>
