<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Mail Demo</title>
</head>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    margin:0;
    background-image:url(https://images.pexels.com/photos/7130496/pexels-photo-7130496.jpeg);
    background-repeat:no-repeat;
    background-attachment:fixed;
    background-position:center;
    background-size:100% 100%;}
    .container{
    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding-top:80px;
    min-height:100vh;
    }
    h1{
    font-size:40px;
    color:black;
    margin-bottom:25px;
    margin-left:0px;
    text-align:center;
    letter-spacing:3px;
    text-shadow:2px 2px 6px black;
    transform:translate(10px, 40px);
    width:100%;
}
    form{
    width:530px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:30px;
    padding:20px;
    background:rgba(37, 200, 225, 0.244);
    backdrop-filter:blur(10px);
    border-radius:15px;
    box-shadow:0 8px 15px rgba(0,0,0,0.3);
    margin-top:20px;
    margin:70px auto 0; 
}

form div{
    display:flex;
    align-items:center;
    margin-bottom:10px;
    gap:5px;
}
label{
    display:inline-block;
    width:100px;
    text-align:right;
    font-size:25px;
    font-weight:bold;
    color:black;
    margin-right:10px;
}

input,
textarea{
    width:300px;
    padding:14px;
    font-size:18px;
    border:none;
    border-radius:5px;
}
input[type="submit"]{
    width:180px;
    padding:12px;
    font-size:13px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-left:110px;}

textarea{
    height:120px;
    resize:none;
}

button{
    margin-top:10px;
    padding:12px 35px;
    font-size:20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

select{
    margin-top:20px;
    padding:10px 20px;
    font-size:18px;
}
    </style>
<body>
    <h1>EMAIL SENDER</h1>

     <form action="{% url 'send_mail' %}" method="POST">
        {% csrf_token %}
        <div>
            <label for="name">Name:</label>
            <input id="name" name="name" type="text" placeholder="Put Your name">
        </div>
        <div>
            <label for="sbj">Subject:</label>
            <input id="sbj" name="subject" type="text" placeholder="Put Your subject">
        </div>
        <div>
            <label for="msg">Message:</label>
            <input id="msg" name="message" type="text" placeholder="Put Your message">
        </div>
        <input type="submit" , value="Send Mail">

    </form>

</body>

</html>
