<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Mail Demo</title>
</head>
<style>
    *{margin:0;
      padding:0;
      box-sizing:border-box;
    }

body{
min-height:100vh;
background:url("https://images.pexels.com/photos/2680270/pexels-photo-2680270.jpeg") center/cover no-repeat;
font-family:Arial,sans-serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1{
color:white;
font-size:40px;
margin-bottom:25px;
}

form{
width:420px;
padding:30px;
background:rgba(255,255,255,0.20);
backdrop-filter:blur(10px);
border-radius:15px;
box-shadow:0 0 25px black;
}

form div{
margin-bottom:15px;
}

label{
display:block;
color:white;
font-size:18px;
margin-bottom:5px;
}

input,textarea{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:8px;
font-size:16px;
}

textarea{
height:120px;
}

input[type="submit"]{
width:100%;
padding:13px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

input[type="submit"]:hover{
background:#00c853;
transform:scale(1.05);
}
    
    
</style>

<body>
    <h1>EMAIL SENDER</h1>

     <form action="{% url 'send_mail' %}" method="POST">
        {% csrf_token %}
        <div>
            <label for="name">Name:</label>
            <input id="name" name="name" type="text" placeholder="Put Your name">
        </div>
        <div>
            <label for="sbj">Subject:</label>
            <input id="sbj" name="subject" type="text" placeholder="Put Your subject">
        </div>
        <div>
            <label for="msg">Message:</label>
            <input id="msg" name="message" type="text" placeholder="Put Your message">
        </div>
        <input type="submit" , value="Send Mail">

    </form>

</body>

</html>
