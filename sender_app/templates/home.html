<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Mail Demo</title>
</head>
<style>
      
     *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#4F8EF7,#7F7FD5,#91EAE4);
}

.container{
    width:420px;
    background:rgba(255,255,255,0.95);
    padding:35px;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,.18);
}

.container h1{
    text-align:center;
    color:#2563eb;
    font-size:32px;
    margin-bottom:8px;
}

.container p{
    text-align:center;
    color:#666;
    margin-bottom:30px;
    font-size:15px;
}

label{
    display:block;
    font-size:15px;
    font-weight:600;
    color:#333;
    margin-bottom:8px;
}

input,
textarea{
    width:100%;
    padding:14px;
    margin-bottom:22px;
    border:1px solid #d6d6d6;
    border-radius:10px;
    outline:none;
    font-size:15px;
    transition:.3s;
}

input:focus,
textarea:focus{
    border-color:#4F8EF7;
    box-shadow:0 0 10px rgba(79,142,247,.3);
}

textarea{
    resize:none;
    height:140px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#2563eb,#4F8EF7);
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(37,99,235,.35);
    background:linear-gradient(90deg,#1d4ed8,#2563eb);
}
</style>

<body>
    <h1>EMAIL SENDER</h1>

     <form action="{% url 'send_mail' %}" method="POST">
        {% csrf_token %}
        <div>
            <label for="name">Name:</label>
            <input id="name" name="name" type="text" placeholder="Put Your name">
        </div>
        <div>
            <label for="sbj">Subject:</label>
            <input id="sbj" name="subject" type="text" placeholder="Put Your subject">
        </div>
        <div>
            <label for="msg">Message:</label>
            <input id="msg" name="message" type="text" placeholder="Put Your message">
        </div>
        <input type="submit" , value="Send Mail">

    </form>

</body>

</html>
