<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Mail Demo</title>
</head>
<style>
      
     *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#a8edea,#fed6e3);
}

.container{
    width:450px;
    background:rgba(255,255,255,0.95);
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#2563eb;
    font-size:34px;
    font-weight:bold;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#666;
    margin-bottom:30px;
    font-size:15px;
}

label{
    display:block;
    font-size:15px;
    font-weight:bold;
    color:#333;
    margin-bottom:8px;
    margin-top:15px;
}

input,
textarea{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:15px;
    transition:.3s;
}

input:focus,
textarea:focus{
    border-color:#2563eb;
    box-shadow:0 0 10px rgba(37,99,235,.25);
}

textarea{
    height:140px;
    resize:none;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#2563eb,#4f8ef7);
    color:#fff;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(37,99,235,.35);
background:linear-gradient(135deg,#1d4ed8,#2563eb);
}
</style>

<body>
    <h1>EMAIL SENDER</h1>

     <form action="{% url 'send_mail' %}" method="POST">
        {% csrf_token %}
        <div>
            <label for="name">Name:</label>
            <input id="name" name="name" type="text" placeholder="Put Your name">
        </div>
        <div>
            <label for="sbj">Subject:</label>
            <input id="sbj" name="subject" type="text" placeholder="Put Your subject">
        </div>
        <div>
            <label for="msg">Message:</label>
            <input id="msg" name="message" type="text" placeholder="Put Your message">
        </div>
        <input type="submit" , value="Send Mail">

    </form>

</body>

</html>
