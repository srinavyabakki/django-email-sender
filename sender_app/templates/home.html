<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Mail Demo</title>
</head>
<style>
    *{margin:0;
      padding:0;
      box-sizing:border-box;
    }
body{
    margin:0;
    background-image:url("git commit -m "Add glass effect and center form design"");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.container{
    width:350px;
    padding:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    border-radius:15px;
}


h1{
color:black;
font-size:40px;
margin-bottom:30px;
text align:center;
}
.container{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}


form{
    width:420px;
    padding:20px;
    background:transparent;
    box-shadow:none;
    backdrop-filter:none;
    align-self:flex-start;
    margin-left:80px;
}

form div{
margin-bottom:15px;
}

label{
display:block;
color:black;
font-size:18px;
margin-bottom:8px;
}

input,textarea{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:8px;
font-size:16px;
}

textarea{
height:120px;
}

input[type="submit"]{
width:100%;
padding:13px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

input[type="submit"]:hover{
background:#e88bdfe7;
transform:scale(1.05);
}
    
    
</style>

<body>
    <h1>EMAIL SENDER</h1>

     <form action="{% url 'send_mail' %}" method="POST">
        {% csrf_token %}
        <div>
            <label for="name">Name:</label>
            <input id="name" name="name" type="text" placeholder="Put Your name">
        </div>
        <div>
            <label for="sbj">Subject:</label>
            <input id="sbj" name="subject" type="text" placeholder="Put Your subject">
        </div>
        <div>
            <label for="msg">Message:</label>
            <input id="msg" name="message" type="text" placeholder="Put Your message">
        </div>
        <input type="submit" , value="Send Mail">

    </form>

</body>

</html>
