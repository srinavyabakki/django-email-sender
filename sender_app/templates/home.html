<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Mail Demo</title>
</head>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}
body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-image:url("/static/images/background.jpg");
    background-size:cover;
    background-position:center;
    filter:blur(10px);
    transform:scale(1.1);
    z-index:-2;
}
body::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
    z-index:-1;
}

.container{
    position:relative;
    z-index:1;
    text-align:center;
}

    h1{
    font-family:"Segoe UI", Arial, sans-serif;
    font-size:45px;
    font-weight:700;
    color:#1e3a8a;
    text-align:center;
    letter-spacing:3px;
    margin-bottom:15px;
}
    form{
    width:530px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:30px;
    padding:20px;
    background:rgba(37, 200, 225, 0.244);
    backdrop-filter:blur(10px);
    border-radius:15px;
    box-shadow:0 8px 15px rgba(0,0,0,0.3);
    margin-top:20px;
    margin:20px auto 0; 
}

form div{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    width:100%;
    margin-bottom:10px;
    gap:8px;
}
label{
    width:auto;
    text-align:left;
    font-size:20px;
    font-weight:600;
    color:black;
    margin-right:0;
}  
input{
    width:420px;
    padding:16px;
    font-size:17px;
    border:none;
    border-radius:8px;
}

input[type="submit"]{
    width:220px;
    padding:14px;
    font-size:18px;
    font-weight:600;
    color:white;
    background:#2563eb;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:15px auto 0;
    transition:0.3s ease;
}
input[type="submit"]:hover{
    background:#1d4ed8;
    transform:scale(1.03);
}


textarea{
    height:120px;
    resize:none;
}

button{
    margin-top:10px;
    padding:12px 35px;
    font-size:20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

select{
    margin-top:20px;
    padding:10px 20px;
    font-size:18px;
}
    </style>
<body>
    <h1>EMAIL SENDER</h1>

     <form action="{% url 'send_mail' %}" method="POST">
        {% csrf_token %}
        <div>
            <label for="name">Name:</label>
            <input id="name" name="name" type="text" placeholder="Put Your name">
        </div>
        <div>
            <label for="sbj">Subject:</label>
            <input id="sbj" name="subject" type="text" placeholder="Put Your subject">
        </div>
        <div>
            <label for="msg">Message:</label>
            <input id="msg" name="message" type="text" placeholder="Put Your message">
        </div>
        <input type="submit" , value="Send Mail">

    </form>

</body>

</html>
