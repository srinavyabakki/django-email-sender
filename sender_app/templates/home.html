<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Mail Demo</title>
</head>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#000000,#111111,#1b1b1b);
    background-size:cover;
}
.container{
    width:420px;
    padding:35px;
    border-radius:20px;
    background:rgba(25,25,25,0.45);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 15px 35px rgba(0,0,0,0.7);
}


.container h1{
    color:#ffffff;
    text-align:center;
    margin-bottom:25px;
    letter-spacing:2px;
    font-size:32px;
}
label{
    color:#f5f5f5;
    font-size:17px;
}


input,
textarea{
    width:100%;
    padding:13px;
    margin:10px 0 20px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.95);
    color:#111;
}


button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#0d6efd;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0b5ed7;
    transform:translateY(-2px);
}
</style>

<body>
    <h1>EMAIL SENDER</h1>

     <form action="{% url 'send_mail' %}" method="POST">
        {% csrf_token %}
        <div>
            <label for="name">Name:</label>
            <input id="name" name="name" type="text" placeholder="Put Your name">
        </div>
        <div>
            <label for="sbj">Subject:</label>
            <input id="sbj" name="subject" type="text" placeholder="Put Your subject">
        </div>
        <div>
            <label for="msg">Message:</label>
            <input id="msg" name="message" type="text" placeholder="Put Your message">
        </div>
        <input type="submit" , value="Send Mail">

    </form>

</body>

</html>
